name: ShellCheck

on:
  push:
    branches: [main, dev-bare-repo]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
          ignore_paths: "ohmyzsh virtualenvwrapper.sh virtualenvwrapper_lazy.sh"
