name: Test Install Script

on:
  push:
    branches: [ main, dev-bare-repo ]
  pull_request:
    branches: [ main ]

jobs:
  test-install:
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Run install script
      run: |
        chmod +x .bin/install.sh
        echo "y" | .bin/install.sh || true
      shell: bash

    - name: Verify uv installation
      run: |
        if command -v uv >/dev/null 2>&1; then
          echo "uv is installed"
          uv --version
        else
          echo "uv not found in PATH"
          exit 1
        fi

    - name: Verify created directories
      run: |
        for dir in ~/.config ~/.vim ~/.local/share/nvim/site/autoload; do
          if [ -d "$dir" ]; then
            echo "OK: $dir exists"
          else
            echo "MISSING: $dir"
          fi
        done
