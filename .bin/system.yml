---
- name: Install system packages
  hosts: localhost
  connection: local
  gather_facts: true
  become: true

  tasks:
    - name: Install core packages
      ansible.builtin.package:
        name:
          - git
          - curl
          - vim
          - neovim
          - gcc
          - make
          - golang
        state: present

    - name: Install ALE linter/fixer tools
      ansible.builtin.package:
        name:
          - clang-tools-extra
          - nodejs
          - npm
        state: present

    - name: Install npm tools (prettier, eslint)
      ansible.builtin.command: npm install -g {{ item }}
      loop:
        - prettier
        - eslint
      register: npm_install
      changed_when: "'added' in npm_install.stdout"

    - name: Display completion message
      ansible.builtin.debug:
        msg: "System packages installation complete!"
