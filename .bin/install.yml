---
- name: Install dotfiles configuration
  hosts: localhost
  connection: local
  gather_facts: true
  become: false
  vars:
    dotfiles_dir: "{{ ansible_facts['env']['HOME'] }}"
    home_dir: "{{ ansible_facts['env']['HOME'] }}"
    python_pkg_manager: "{{ pkg_manager | default('pdm') }}"

  tasks:
    - name: Check if rustup is installed
      ansible.builtin.command: which rustup
      register: rustup_check
      failed_when: false
      changed_when: false

    - name: Install rustup
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source {{ home_dir }}/.cargo/env
        executable: /bin/bash
      changed_when: true
      when: rustup_check.rc != 0
      tags: rust

    - name: Update rustup
      ansible.builtin.command: rustup update
      changed_when: true
      when: rustup_check.rc == 0 and update_rustup | default(false)
      tags: rust

    # --- PDM (default) ---

    - name: Check if pdm is installed
      ansible.builtin.command: which pdm
      register: pdm_check
      failed_when: false
      changed_when: false
      when: python_pkg_manager == "pdm"

    # The standalone installer needs ensurepip (python3-venv on Debian),
    # which is absent on minimal systems — prefer uv, which needs neither.
    - name: Install pdm
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if command -v uv >/dev/null 2>&1; then
            uv tool install pdm
          else
            curl -sSL https://pdm-project.org/install-pdm.py | python3 -
          fi
        executable: /bin/bash
      changed_when: true
      when: python_pkg_manager == "pdm" and pdm_check.rc != 0 and ansible_facts['system'] in ["Linux", "Darwin"]
      tags: python

    - name: Update pdm
      ansible.builtin.command: pdm self update
      changed_when: true
      when: python_pkg_manager == "pdm" and pdm_check.rc == 0 and update_pdm | default(false)
      tags: python

    # --- uv (alternative) ---

    - name: Check if uv is installed
      ansible.builtin.command: which uv
      register: uv_check
      failed_when: false
      changed_when: false
      when: python_pkg_manager == "uv"

    - name: Install uv (which includes uvx)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
        executable: /bin/bash
      changed_when: true
      when: python_pkg_manager == "uv" and uv_check.rc != 0
      tags: python

    - name: Update uv
      ansible.builtin.command: uv self update
      changed_when: true
      when: python_pkg_manager == "uv" and uv_check.rc == 0 and update_uv | default(false)
      tags: python

    - name: Check if gh (GitHub CLI) is installed
      ansible.builtin.command: which gh
      register: gh_check
      failed_when: false
      changed_when: false

    - name: Install GitHub CLI (Debian/Ubuntu)  # noqa: command-instead-of-module
      ansible.builtin.shell: |
        set -o pipefail
        keyring=/usr/share/keyrings/githubcli-archive-keyring.gpg
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of="$keyring"
        arch="$(dpkg --print-architecture)"
        echo "deb [arch=$arch signed-by=$keyring] https://cli.github.com/packages stable main" \
          | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y
      args:
        executable: /bin/bash
      changed_when: true
      when: gh_check.rc != 0 and ansible_facts['os_family'] == "Debian"
      tags: github

    - name: Create ~/.local/bin directory
      ansible.builtin.file:
        path: "{{ home_dir }}/.local/bin"
        state: directory
        mode: '0755'
      when: install_github_cli | default(false) and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Check if gh (GitHub CLI) is installed (macOS)
      ansible.builtin.command: command -v gh
      register: gh_check_macos
      failed_when: false
      changed_when: false
      when: install_github_cli | default(false) and ansible_facts['system'] == "Darwin"

    - name: Download and extract GitHub CLI for macOS
      ansible.builtin.unarchive:
        src: "https://github.com/cli/cli/releases/download/v2.81.0/gh_2.81.0_macOS_amd64.tar.gz"
        dest: "/tmp"
        remote_src: true
        creates: "/tmp/gh_2.81.0_macOS_amd64"
      when: install_github_cli | default(false) and gh_check_macos.rc != 0 and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Copy gh binary to ~/.local/bin
      ansible.builtin.copy:
        src: "/tmp/gh_2.81.0_macOS_amd64/bin/gh"
        dest: "{{ home_dir }}/.local/bin/gh"
        mode: '0755'
        remote_src: true
      when: install_github_cli | default(false) and gh_check_macos.rc != 0 and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "/tmp/gh_2.81.0_macOS_amd64"
        state: absent
      when: gh_check.rc != 0 and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Install GitHub CLI (RHEL/CentOS)
      ansible.builtin.shell: |
        sudo dnf install 'dnf-command(config-manager)' -y
        sudo dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
        sudo dnf install gh -y
      args:
        executable: /bin/bash
      changed_when: true
      when: gh_check.rc != 0 and ansible_facts['os_family'] == "RedHat"
      tags: github

    - name: Check if Go is installed
      ansible.builtin.command: which go
      register: go_check
      failed_when: false
      changed_when: false

    - name: Check Go version
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          go version | grep -o 'go[0-9.]*' | cut -c3-
        executable: /bin/bash
      register: go_version_check
      when: go_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Check if NATS CLI is installed
      ansible.builtin.command: which nats
      register: nats_check
      failed_when: false
      changed_when: false
      when: go_check.rc == 0 and install_nats_tools | default(false)

    - name: Install NATS tools
      ansible.builtin.shell:
        cmd: |
          go install github.com/nats-io/natscli/nats@latest
          go install github.com/nats-io/nats-server/v2@main
          go install github.com/nats-io/nkeys/nk@latest
      register: nats_install
      changed_when: nats_install.rc == 0
      failed_when: false
      when: go_check.rc == 0 and ansible_facts['os_family'] != "Windows" and install_nats_tools | default(false) and nats_check.rc != 0
      tags: nats

    - name: Install Python ALE tools
      ansible.builtin.command: uvx --from uv uv tool install {{ item }}
      loop:
        - pyright
        - ruff
      register: py_tool_install
      changed_when: "'Installed' in py_tool_install.stdout"
      failed_when: false
      tags: python-tools

    - name: Install Go ALE tools
      ansible.builtin.command: go install {{ item.pkg }}
      loop:
        - { pkg: "golang.org/x/tools/gopls@latest", bin: "gopls" }
        - { pkg: "github.com/golangci/golangci-lint/cmd/golangci-lint@latest", bin: "golangci-lint" }
        - { pkg: "golang.org/x/tools/cmd/goimports@latest", bin: "goimports" }
      args:
        creates: "{{ home_dir }}/go/bin/{{ item.bin }}"
      when: go_check.rc == 0
      tags: go-tools

    - name: Initialize git submodules  # noqa: command-instead-of-module
      ansible.builtin.shell:
        cmd: >-
          git --git-dir="{{ dotfiles_dir }}/.dotfiles"
          --work-tree="{{ dotfiles_dir }}" submodule init &&
          git --git-dir="{{ dotfiles_dir }}/.dotfiles"
          --work-tree="{{ dotfiles_dir }}" submodule update
      register: submodule_result
      changed_when: "'Cloning into' in submodule_result.stderr or 'Submodule path' in submodule_result.stdout"
      tags: git

    - name: Create necessary directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ home_dir }}/.config"
        - "{{ home_dir }}/.config/zsh"
        - "{{ home_dir }}/.config/nvim"
        - "{{ home_dir }}/.vim"
        - "{{ home_dir }}/.vim/autoload"
        - "{{ home_dir }}/.local/share/nvim/site/autoload"

    # The bare-repo checkout places vim configs at ~/vim/, but .vimrc and
    # nvim/init.lua source them from ~/.vim/ — link each file across.
    - name: Link shared Vim config files into ~/.vim
      ansible.builtin.file:
        src: "{{ item }}"
        dest: "{{ home_dir }}/.vim/{{ item | basename }}"
        state: link
      loop: "{{ lookup('fileglob', dotfiles_dir + '/vim/*.vim', wantlist=True) }}"

    - name: Link Neovim init.lua into ~/.config/nvim
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/nvim/init.lua"
        dest: "{{ home_dir }}/.config/nvim/init.lua"
        state: link

    - name: Check if Neovim is installed
      ansible.builtin.command: which nvim
      register: nvim_check
      failed_when: false
      changed_when: false

    # On systems where /usr/bin/vim is an alternatives link to nvim, the
    # real-Vim plugin tasks must be skipped (nvim has its own tasks below
    # and does not read ~/.vim/autoload).
    - name: Check if Vim is installed (and is real Vim, not a Neovim alias)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          command -v vim && vim --version | head -1 | grep -q '^VIM'
        executable: /bin/bash
      register: vim_check
      failed_when: false
      changed_when: false

    - name: Check if Vim-Plug is installed for Vim
      ansible.builtin.stat:
        path: "{{ home_dir }}/.vim/autoload/plug.vim"
      register: vim_plug_stat

    - name: Download Vim-Plug for Vim
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ home_dir }}/.vim/autoload/plug.vim"
        mode: '0644'
      register: vim_plug_download
      when: vim_check.rc == 0 and not vim_plug_stat.stat.exists
      tags: vim-plug

    - name: Check if Vim plugins are installed
      ansible.builtin.stat:
        path: "{{ home_dir }}/.vim/plugged"
      register: vim_plugged_stat

    - name: Install Vim plugins
      ansible.builtin.command: vim -es -u "{{ home_dir }}/.vimrc" -i NONE -c "PlugInstall" -c "qa"
      changed_when: true
      when: vim_check.rc == 0 and not vim_plugged_stat.stat.exists
      tags: vim-plugins

    - name: Check if Vim-Plug is installed for Neovim
      ansible.builtin.stat:
        path: "{{ home_dir }}/.local/share/nvim/site/autoload/plug.vim"
      register: nvim_plug_stat

    - name: Download Vim-Plug for Neovim
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ home_dir }}/.local/share/nvim/site/autoload/plug.vim"
        mode: '0644'
      register: nvim_plug_download
      when: nvim_check.rc == 0 and not nvim_plug_stat.stat.exists
      tags: nvim-plug

    # plug#begin('~/.vim/plugged') in .vimrc is shared by both editors,
    # so check the real install location, not the nvim site dir.
    - name: Check if Neovim plugins are installed
      ansible.builtin.stat:
        path: "{{ home_dir }}/.vim/plugged"
      register: nvim_plugged_stat

    - name: Install Neovim plugins
      ansible.builtin.command: nvim --headless -c 'PlugInstall --sync' -c 'qa!'
      changed_when: true
      when: nvim_check.rc == 0 and not nvim_plugged_stat.stat.exists
      tags: nvim-plugins

    # ------------------------------------------------------------------
    # ALE fixers, linters and language-server "completers"
    # npm / cargo / Homebrew use community.general modules (truly idempotent:
    # they only install what is missing and report changed accurately).
    # Go / uv / rustup have no modules, so they stay shell with presence
    # guards + an honest changed_when.
    # Requires the community.general collection: run this playbook via
    # `uvx --from ansible ansible-playbook` (the ansible package bundles it),
    # not `--from ansible-core`.
    # ------------------------------------------------------------------
    - name: Check if npm is available
      ansible.builtin.command: which npm
      register: npm_check
      changed_when: false
      failed_when: false
      tags: ale, ale-npm

    - name: Point npm at a user-writable global prefix when needed
      ansible.builtin.shell: |
        prefix="$(npm config get prefix)"
        if [ ! -w "$prefix" ]; then
          mkdir -p "$HOME/.local"
          npm config set prefix "$HOME/.local"
          echo "CHANGED prefix -> $HOME/.local (was $prefix)"
        fi
      register: npm_prefix
      changed_when: "'CHANGED' in npm_prefix.stdout"
      when: npm_check.rc == 0
      tags: ale, ale-npm

    - name: Install ALE JS/TS fixers, linters and language servers (npm)
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: present
      loop:
        - prettier
        - eslint
        - typescript
        - typescript-language-server
        - pyright
        - bash-language-server
        - yaml-language-server
        - vscode-langservers-extracted
        - jsonlint
        - markdownlint-cli
        - clang-format
      when: npm_check.rc == 0
      tags: ale, ale-npm

    - name: Install ALE Python fixers and linters (uv tool)
      ansible.builtin.shell: |
        command -v uv >/dev/null 2>&1 || { echo "uv not found, skipping"; exit 0; }
        for tool in black isort ruff flake8 yamllint vim-vint; do
          uv tool install "$tool" 2>&1 || echo "warning: failed to install $tool"
        done
      register: uv_tools
      # uv prints "Installed N executable(s)" on a real install, and
      # "... is already installed" (lowercase) when nothing changes.
      changed_when: "'Installed' in uv_tools.stdout"
      tags: ale, ale-python

    - name: Install ALE Go fixers and language servers (go install)
      ansible.builtin.shell:
        cmd: |
          command -v go >/dev/null 2>&1 || { echo "go not found, skipping"; exit 0; }
          changed=0
          # Only build a tool when its binary is missing (go install otherwise
          # recompiles on every run). Try @latest, then fall back to versions
          # that build with older Go toolchains.
          install_if_missing() {
            tool=$1; shift
            command -v "$tool" >/dev/null 2>&1 && return 0
            for ref in "$@"; do
              if go install "$ref" 2>/dev/null; then changed=1; return 0; fi
            done
            echo "warning: could not install $tool (consider upgrading Go)"
          }
          install_if_missing gopls golang.org/x/tools/gopls@latest golang.org/x/tools/gopls@v0.11.0
          install_if_missing goimports golang.org/x/tools/cmd/goimports@latest golang.org/x/tools/cmd/goimports@v0.5.0
          install_if_missing shfmt mvdan.cc/sh/v3/cmd/shfmt@latest mvdan.cc/sh/v3/cmd/shfmt@v3.6.0
          [ "$changed" -eq 1 ] && echo "CHANGED"
          exit 0
      environment:
        PATH: "{{ home_dir }}/go/bin:{{ ansible_facts['env']['PATH'] }}"
      register: go_tools
      changed_when: "'CHANGED' in go_tools.stdout"
      tags: ale, ale-go

    - name: Install ALE Rust components (rustfmt, rust-analyzer, clippy)
      ansible.builtin.shell: |
        command -v rustup >/dev/null 2>&1 || { echo "rustup not found, skipping"; exit 0; }
        rustup component add rustfmt rust-analyzer clippy
      register: rustup_components
      # rustup prints "info: installing component ..." only on a real install.
      changed_when: "'installing component' in rustup_components.stdout"
      tags: ale, ale-rust

    - name: Check if cargo is available
      ansible.builtin.command: which cargo
      register: cargo_check
      changed_when: false
      failed_when: false
      tags: ale, ale-stylua

    - name: Install ALE Rust fixer (stylua via cargo)
      community.general.cargo:
        name: stylua
        state: present
      when: cargo_check.rc == 0
      tags: ale, ale-stylua

    - name: Install shellcheck (ALE shell linter) on macOS
      community.general.homebrew:
        name: shellcheck
        state: present
      when: ansible_facts['system'] == "Darwin"
      tags: ale, ale-shellcheck

    # The apt/dnf shellcheck tasks need root. This playbook is otherwise
    # non-root, so they are opt-in: run with -e install_system_packages=true
    # (and --ask-become-pass) to install shellcheck system-wide.
    - name: Install shellcheck (ALE shell linter) on Debian/Ubuntu
      ansible.builtin.apt:
        name: shellcheck
        state: present
      become: true
      when: install_system_packages | default(false) and ansible_facts['os_family'] == "Debian"
      tags: ale, ale-shellcheck

    - name: Install shellcheck (ALE shell linter) on RHEL/Fedora
      ansible.builtin.dnf:
        name: ShellCheck
        state: present
      become: true
      when: install_system_packages | default(false) and ansible_facts['os_family'] == "RedHat"
      tags: ale, ale-shellcheck

    - name: Display completion message
      ansible.builtin.debug:
        msg: "Dotfiles installation complete!"
