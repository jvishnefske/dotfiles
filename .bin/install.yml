---
- name: Install dotfiles configuration
  hosts: localhost
  connection: local
  gather_facts: true
  become: false
  vars:
    dotfiles_dir: "{{ ansible_facts['env']['HOME'] }}"
    home_dir: "{{ ansible_facts['env']['HOME'] }}"
    python_pkg_manager: "{{ pkg_manager | default('pdm') }}"

  tasks:
    - name: Check if rustup is installed
      ansible.builtin.command: which rustup
      register: rustup_check
      failed_when: false
      changed_when: false

    - name: Install rustup
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source {{ home_dir }}/.cargo/env
      changed_when: true
      when: rustup_check.rc != 0
      tags: rust

    - name: Update rustup
      ansible.builtin.command: rustup update
      changed_when: true
      when: rustup_check.rc == 0 and update_rustup | default(false)
      tags: rust

    # --- PDM (default) ---

    - name: Check if pdm is installed
      ansible.builtin.command: which pdm
      register: pdm_check
      failed_when: false
      changed_when: false
      when: python_pkg_manager == "pdm"

    - name: Install pdm
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl -sSL https://pdm-project.org/install-pdm.py | python3 -
      changed_when: true
      when: python_pkg_manager == "pdm" and pdm_check.rc != 0 and ansible_facts['system'] in ["Linux", "Darwin"]
      tags: python

    - name: Update pdm
      ansible.builtin.command: pdm self update
      changed_when: true
      when: python_pkg_manager == "pdm" and pdm_check.rc == 0 and update_pdm | default(false)
      tags: python

    # --- uv (alternative) ---

    - name: Check if uv is installed
      ansible.builtin.command: which uv
      register: uv_check
      failed_when: false
      changed_when: false
      when: python_pkg_manager == "uv"

    - name: Install uv (which includes uvx)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
      changed_when: true
      when: python_pkg_manager == "uv" and uv_check.rc != 0
      tags: python

    - name: Update uv
      ansible.builtin.command: uv self update
      changed_when: true
      when: python_pkg_manager == "uv" and uv_check.rc == 0 and update_uv | default(false)
      tags: python

    - name: Create ~/.local/bin directory
      ansible.builtin.file:
        path: "{{ home_dir }}/.local/bin"
        state: directory
        mode: '0755'
      when: install_github_cli | default(false) and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Check if gh (GitHub CLI) is installed (macOS)
      ansible.builtin.command: command -v gh
      register: gh_check_macos
      failed_when: false
      changed_when: false
      when: install_github_cli | default(false) and ansible_facts['system'] == "Darwin"

    - name: Download and extract GitHub CLI for macOS
      ansible.builtin.unarchive:
        src: "https://github.com/cli/cli/releases/download/v2.81.0/gh_2.81.0_macOS_amd64.tar.gz"
        dest: "/tmp"
        remote_src: true
        creates: "/tmp/gh_2.81.0_macOS_amd64"
      when: install_github_cli | default(false) and gh_check_macos.rc != 0 and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Copy gh binary to ~/.local/bin
      ansible.builtin.copy:
        src: "/tmp/gh_2.81.0_macOS_amd64/bin/gh"
        dest: "{{ home_dir }}/.local/bin/gh"
        mode: '0755'
        remote_src: true
      when: install_github_cli | default(false) and gh_check_macos.rc != 0 and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "/tmp/gh_2.81.0_macOS_amd64"
        state: absent
      when: install_github_cli | default(false) and gh_check_macos.rc != 0 and ansible_facts['system'] == "Darwin"
      tags: github

    - name: Check if Go is installed
      ansible.builtin.command: which go
      register: go_check
      failed_when: false
      changed_when: false

    - name: Check Go version
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          go version | grep -o 'go[0-9.]*' | cut -c3-
      register: go_version_check
      when: go_check.rc == 0
      changed_when: false
      failed_when: false

    - name: Check if NATS CLI is installed
      ansible.builtin.command: which nats
      register: nats_check
      failed_when: false
      changed_when: false
      when: go_check.rc == 0 and install_nats_tools | default(false)

    - name: Install NATS tools
      ansible.builtin.shell:
        cmd: |
          go install github.com/nats-io/natscli/nats@latest
          go install github.com/nats-io/nats-server/v2@main
          go install github.com/nats-io/nkeys/nk@latest
      register: nats_install
      changed_when: nats_install.rc == 0
      failed_when: false
      when: go_check.rc == 0 and ansible_facts['os_family'] != "Windows" and install_nats_tools | default(false) and nats_check.rc != 0
      tags: nats

    - name: Install Python ALE tools
      ansible.builtin.command: uvx --from uv uv tool install {{ item }}
      loop:
        - pyright
        - ruff
      register: py_tool_install
      changed_when: "'Installed' in py_tool_install.stdout"
      failed_when: false
      tags: python-tools

    - name: Install Go ALE tools
      ansible.builtin.command: go install {{ item.pkg }}
      loop:
        - { pkg: "golang.org/x/tools/gopls@latest", bin: "gopls" }
        - { pkg: "github.com/golangci/golangci-lint/cmd/golangci-lint@latest", bin: "golangci-lint" }
        - { pkg: "golang.org/x/tools/cmd/goimports@latest", bin: "goimports" }
      args:
        creates: "{{ home_dir }}/go/bin/{{ item.bin }}"
      when: go_check.rc == 0
      tags: go-tools

    - name: Initialize git submodules
      ansible.builtin.shell:
        cmd: git --git-dir="{{ dotfiles_dir }}/.dotfiles" --work-tree="{{ dotfiles_dir }}" submodule init && git --git-dir="{{ dotfiles_dir }}/.dotfiles" --work-tree="{{ dotfiles_dir }}" submodule update
      register: submodule_result
      changed_when: "'Cloning into' in submodule_result.stderr or 'Submodule path' in submodule_result.stdout"
      tags: git

    - name: Create necessary directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ home_dir }}/.config"
        - "{{ home_dir }}/.config/zsh"
        - "{{ home_dir }}/.config/nvim"
        - "{{ home_dir }}/.vim"
        - "{{ home_dir }}/.vim/autoload"
        - "{{ home_dir }}/.local/share/nvim/site/autoload"

    - name: Check if Neovim is installed
      ansible.builtin.command: which nvim
      register: nvim_check
      failed_when: false
      changed_when: false

    - name: Check if Vim is installed
      ansible.builtin.command: which vim
      register: vim_check
      failed_when: false
      changed_when: false

    - name: Check if Vim-Plug is installed for Vim
      ansible.builtin.stat:
        path: "{{ home_dir }}/.vim/autoload/plug.vim"
      register: vim_plug_stat

    - name: Download Vim-Plug for Vim
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ home_dir }}/.vim/autoload/plug.vim"
        mode: '0644'
      register: vim_plug_download
      when: vim_check.rc == 0 and not vim_plug_stat.stat.exists
      tags: vim-plug

    - name: Check if Vim plugins are installed
      ansible.builtin.stat:
        path: "{{ home_dir }}/.vim/plugged"
      register: vim_plugged_stat

    - name: Install Vim plugins
      ansible.builtin.command: vim -es -u "{{ home_dir }}/.vimrc" -i NONE -c "PlugInstall" -c "qa"
      changed_when: true
      when: vim_check.rc == 0 and not vim_plugged_stat.stat.exists
      tags: vim-plugins

    - name: Check if Vim-Plug is installed for Neovim
      ansible.builtin.stat:
        path: "{{ home_dir }}/.local/share/nvim/site/autoload/plug.vim"
      register: nvim_plug_stat

    - name: Download Vim-Plug for Neovim
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ home_dir }}/.local/share/nvim/site/autoload/plug.vim"
        mode: '0644'
      register: nvim_plug_download
      when: nvim_check.rc == 0 and not nvim_plug_stat.stat.exists
      tags: nvim-plug

    - name: Check if Neovim plugins are installed
      ansible.builtin.stat:
        path: "{{ home_dir }}/.local/share/nvim/site/plugged"
      register: nvim_plugged_stat

    - name: Install Neovim plugins
      ansible.builtin.command: nvim --headless -c 'autocmd User PlugComplete quitall' -c 'PlugInstall' -c 'sleep 500m'
      changed_when: true
      when: nvim_check.rc == 0 and not nvim_plugged_stat.stat.exists
      tags: nvim-plugins

    - name: Display completion message
      ansible.builtin.debug:
        msg: "Dotfiles installation complete!"
